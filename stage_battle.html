<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stage Battle — The Geometry Showdown</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@500;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --burgundy: #6b1f2e;
  --burgundy-deep: #4a1320;
  --burgundy-light: #8a2a3d;
  --gold: #d4a574;
  --gold-bright: #f4c97a;
  --gold-deep: #a87f4a;
  --cream: #f5ecd7;
  --cream-warm: #faf2dd;
  --parchment: #ede0c4;
  --spotlight: #ffe066;
  --ink: #1a0e0e;
  --ink-soft: #3a2424;
  --stage-red: #a8324a;
  --success: #4a7c59;
  --error: #8b2c2c;
  --grid-line: rgba(107, 31, 46, 0.18);
  --shadow-deep: 0 12px 32px rgba(26, 14, 14, 0.35);
  --shadow-soft: 0 4px 14px rgba(26, 14, 14, 0.18);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  min-height: 100vh;
  font-family: 'Crimson Pro', Georgia, serif;
  color: var(--ink);
  background:
    radial-gradient(ellipse at top, var(--burgundy-light) 0%, var(--burgundy) 35%, var(--burgundy-deep) 100%);
  background-attachment: fixed;
  overflow-x: hidden;
}

/* Marquee bulb decoration */
.marquee-bulbs {
  position: relative;
}
.marquee-bulbs::before, .marquee-bulbs::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 14px;
  background-image: radial-gradient(circle, var(--gold-bright) 30%, var(--gold-deep) 50%, transparent 60%);
  background-size: 22px 14px;
  background-repeat: repeat-x;
}
.marquee-bulbs::before { top: -7px; }
.marquee-bulbs::after { bottom: -7px; }

/* Velvet curtain side panels */
.curtain-side {
  position: fixed;
  top: 0; bottom: 0;
  width: 60px;
  background:
    repeating-linear-gradient(90deg,
      var(--burgundy-deep) 0px,
      var(--burgundy) 8px,
      var(--burgundy-light) 14px,
      var(--burgundy) 22px,
      var(--burgundy-deep) 30px
    );
  box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
  z-index: 1;
  pointer-events: none;
}
.curtain-side.left { left: 0; }
.curtain-side.right { right: 0; }

@media (max-width: 720px) {
  .curtain-side { width: 24px; }
}

/* Main stage container */
.stage {
  position: relative;
  z-index: 2;
  max-width: 1100px;
  margin: 0 auto;
  padding: 40px 80px 60px;
  min-height: 100vh;
}
@media (max-width: 720px) {
  .stage { padding: 24px 36px 40px; }
}

/* Spotlight overlay on hero */
.spotlight {
  position: absolute;
  top: -50px; left: 50%;
  transform: translateX(-50%);
  width: 800px; height: 400px;
  background: radial-gradient(ellipse at center top, rgba(255, 224, 102, 0.25) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* Headline marquee */
.marquee-title {
  font-family: 'Cinzel Decorative', serif;
  font-weight: 900;
  text-align: center;
  color: var(--gold-bright);
  text-shadow:
    0 2px 0 var(--gold-deep),
    0 4px 12px rgba(0,0,0,0.5),
    0 0 30px rgba(255, 224, 102, 0.3);
  letter-spacing: 0.04em;
  line-height: 1.05;
  position: relative;
  z-index: 1;
}
.marquee-title.huge { font-size: clamp(2.2rem, 6vw, 4rem); }
.marquee-title.big { font-size: clamp(1.6rem, 4vw, 2.6rem); }
.marquee-title.med { font-size: clamp(1.2rem, 3vw, 1.8rem); }

.subtitle {
  text-align: center;
  font-family: 'Cinzel', serif;
  font-weight: 500;
  color: var(--cream);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-size: 0.85rem;
  margin-top: 12px;
  opacity: 0.85;
}

/* Card / poster base */
.poster {
  background: linear-gradient(180deg, var(--cream-warm) 0%, var(--parchment) 100%);
  border: 3px solid var(--gold-deep);
  border-radius: 8px;
  padding: 28px;
  box-shadow:
    var(--shadow-deep),
    inset 0 0 0 1px var(--gold-bright),
    inset 0 0 30px rgba(212, 165, 116, 0.15);
  position: relative;
}
.poster::before, .poster::after {
  content: '✦';
  position: absolute;
  font-size: 1.4rem;
  color: var(--gold-deep);
  top: 8px;
}
.poster::before { left: 14px; }
.poster::after { right: 14px; }

/* Lesson posters grid */
.posters-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 24px;
  margin-top: 40px;
}

.lesson-poster {
  background: linear-gradient(180deg, var(--cream-warm) 0%, var(--parchment) 100%);
  border: 3px solid var(--gold-deep);
  border-radius: 6px;
  padding: 22px 18px;
  box-shadow: var(--shadow-deep), inset 0 0 0 1px var(--gold-bright);
  cursor: pointer;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.lesson-poster:hover:not(.locked) {
  transform: translateY(-6px);
  box-shadow: 0 18px 40px rgba(0,0,0,0.45), inset 0 0 0 1px var(--gold-bright);
}
.lesson-poster.locked {
  cursor: not-allowed;
  filter: grayscale(0.6) brightness(0.75);
}
.lesson-poster .act-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 0.3em;
  color: var(--burgundy);
  margin-bottom: 6px;
}
.lesson-poster .lesson-name {
  font-family: 'Cinzel', serif;
  font-weight: 700;
  font-size: 1.15rem;
  color: var(--ink);
  margin-bottom: 14px;
  line-height: 1.2;
}
.lesson-poster .lesson-illustration {
  width: 100%;
  height: 130px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.lesson-poster .stars-row {
  margin-top: auto;
  font-size: 1.1rem;
  letter-spacing: 0.15em;
  color: var(--gold-deep);
}
.lesson-poster .stars-row .filled { color: var(--gold-bright); text-shadow: 0 0 8px rgba(255, 224, 102, 0.6); }
.lesson-poster .stars-row .empty { color: rgba(168, 127, 74, 0.35); }
.lesson-poster .status-pill {
  display: inline-block;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.75rem;
  letter-spacing: 0.2em;
  padding: 3px 10px;
  border-radius: 12px;
  margin-top: 8px;
}
.lesson-poster .status-pill.complete {
  background: var(--burgundy);
  color: var(--cream-warm);
}
.lesson-poster .status-pill.new {
  background: var(--gold-bright);
  color: var(--ink);
}
.lock-icon {
  font-size: 2rem;
  color: var(--gold-deep);
  margin: 12px 0;
}

/* Buttons */
.btn {
  font-family: 'Cinzel', serif;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-size: 0.95rem;
  padding: 14px 28px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s ease;
  position: relative;
}
.btn-primary {
  background: linear-gradient(180deg, var(--stage-red) 0%, var(--burgundy) 100%);
  color: var(--cream-warm);
  box-shadow: 0 4px 0 var(--burgundy-deep), var(--shadow-soft);
  border: 2px solid var(--gold-deep);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 0 var(--burgundy-deep), var(--shadow-deep);
}
.btn-primary:active {
  transform: translateY(2px);
  box-shadow: 0 2px 0 var(--burgundy-deep);
}
.btn-secondary {
  background: var(--cream-warm);
  color: var(--burgundy);
  border: 2px solid var(--burgundy);
  box-shadow: 0 3px 0 var(--burgundy);
}
.btn-secondary:hover { transform: translateY(-1px); box-shadow: 0 4px 0 var(--burgundy); }
.btn-secondary:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--burgundy); }
.btn-ghost {
  background: transparent;
  color: var(--cream);
  border: 1px solid var(--gold);
}
.btn-ghost:hover { background: rgba(255,255,255,0.08); }
.btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none !important;
}

.btn-row {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 24px;
}

/* Playbook styling */
.playbook-section {
  margin-top: 22px;
}
.playbook-section h3 {
  font-family: 'Cinzel', serif;
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--burgundy);
  border-bottom: 1.5px solid var(--gold-deep);
  padding-bottom: 6px;
  margin-bottom: 12px;
}
.playbook-section p, .playbook-section li {
  font-size: 1.05rem;
  line-height: 1.6;
  color: var(--ink-soft);
}
.playbook-section ul, .playbook-section ol {
  padding-left: 22px;
}
.playbook-section ul li, .playbook-section ol li {
  margin-bottom: 6px;
}
.worked-example {
  background: rgba(212, 165, 116, 0.18);
  border-left: 4px solid var(--gold-deep);
  padding: 14px 18px;
  margin: 12px 0;
  border-radius: 0 4px 4px 0;
  font-size: 1rem;
}
.worked-example .ex-label {
  font-family: 'Cinzel', serif;
  font-weight: 700;
  font-size: 0.8rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold-deep);
  margin-bottom: 6px;
}
.watch-out {
  background: linear-gradient(180deg, #fff5d6 0%, #f9e8b5 100%);
  border: 2px dashed var(--burgundy);
  padding: 16px 20px;
  margin: 16px 0;
  border-radius: 6px;
  position: relative;
}
.watch-out::before {
  content: '⚠ WATCH OUT';
  position: absolute;
  top: -12px; left: 16px;
  background: var(--burgundy);
  color: var(--gold-bright);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.85rem;
  letter-spacing: 0.25em;
  padding: 3px 12px;
  border-radius: 3px;
}
.watch-out p { margin-top: 4px; font-size: 1.02rem; }

/* Question card */
.question-card {
  margin-top: 24px;
}
.question-card .q-number {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.05rem;
  letter-spacing: 0.3em;
  color: var(--gold-deep);
  margin-bottom: 8px;
}
.question-card .q-prompt {
  font-size: 1.18rem;
  line-height: 1.55;
  color: var(--ink);
  margin-bottom: 18px;
}
.question-card .q-prompt code {
  font-family: 'Bebas Neue', sans-serif;
  background: var(--burgundy);
  color: var(--gold-bright);
  padding: 1px 8px;
  border-radius: 3px;
  letter-spacing: 0.05em;
  font-size: 1.05em;
}

/* MC choices */
.choices {
  display: grid;
  gap: 10px;
}
.choice {
  background: var(--cream-warm);
  border: 2px solid var(--gold-deep);
  border-radius: 4px;
  padding: 12px 18px;
  font-family: 'Crimson Pro', Georgia, serif;
  font-size: 1.05rem;
  color: var(--ink);
  cursor: pointer;
  transition: all 0.18s ease;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 14px;
}
.choice:hover:not(:disabled) {
  background: #fff5dc;
  border-color: var(--burgundy);
  transform: translateX(3px);
}
.choice .choice-letter {
  font-family: 'Cinzel', serif;
  font-weight: 700;
  background: var(--burgundy);
  color: var(--gold-bright);
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  flex-shrink: 0;
}
.choice.correct {
  background: #d4e8d8;
  border-color: var(--success);
}
.choice.correct .choice-letter { background: var(--success); }
.choice.incorrect {
  background: #f0d2d2;
  border-color: var(--error);
}
.choice.incorrect .choice-letter { background: var(--error); }
.choice:disabled { cursor: default; }

/* Numeric input */
.numeric-input {
  font-family: 'Cinzel', serif;
  font-size: 1.4rem;
  font-weight: 600;
  padding: 12px 18px;
  border: 2px solid var(--gold-deep);
  border-radius: 4px;
  background: var(--cream-warm);
  color: var(--ink);
  width: 180px;
  text-align: center;
  outline: none;
  transition: all 0.2s ease;
}
.numeric-input:focus {
  border-color: var(--burgundy);
  box-shadow: 0 0 0 3px rgba(168, 50, 74, 0.2);
}
.numeric-input.correct {
  background: #d4e8d8;
  border-color: var(--success);
  color: var(--success);
}
.numeric-input.incorrect {
  background: #f0d2d2;
  border-color: var(--error);
  color: var(--error);
}
.numeric-row {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.coord-row {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'Cinzel', serif;
  font-size: 1.6rem;
  color: var(--burgundy);
}
.coord-row .numeric-input { width: 90px; font-size: 1.2rem; }

/* Feedback bar */
.feedback {
  margin-top: 16px;
  padding: 14px 18px;
  border-radius: 4px;
  font-size: 1.05rem;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  animation: slideIn 0.3s ease;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}
.feedback.correct {
  background: linear-gradient(180deg, #d4e8d8 0%, #b8d8be 100%);
  border-left: 5px solid var(--success);
  color: #1f3d2a;
}
.feedback.incorrect {
  background: linear-gradient(180deg, #f0d2d2 0%, #e0b8b8 100%);
  border-left: 5px solid var(--error);
  color: #3d1a1a;
}
.feedback .icon {
  font-size: 1.4rem;
  flex-shrink: 0;
  line-height: 1.2;
}
.feedback .text strong { font-family: 'Cinzel', serif; letter-spacing: 0.05em; }

/* Progress bulb bar */
.progress-bulbs {
  display: flex;
  justify-content: center;
  gap: 14px;
  margin: 18px 0 6px;
}
.bulb {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: rgba(212, 165, 116, 0.25);
  border: 2px solid var(--gold-deep);
  transition: all 0.3s ease;
}
.bulb.lit {
  background: radial-gradient(circle at 30% 30%, var(--spotlight), var(--gold-bright) 60%, var(--gold-deep) 100%);
  box-shadow: 0 0 14px var(--spotlight), 0 0 4px #fff inset;
}
.bulb.current {
  background: radial-gradient(circle at 30% 30%, #fff, var(--spotlight) 50%, var(--gold) 100%);
  box-shadow: 0 0 18px var(--spotlight);
  animation: pulse 1.4s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}

/* Stars rating */
.stars-display {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin: 20px 0;
}
.star {
  font-size: 3rem;
  color: rgba(168, 127, 74, 0.3);
  transition: all 0.3s ease;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
}
.star.filled {
  color: var(--gold-bright);
  filter: drop-shadow(0 0 12px rgba(255, 224, 102, 0.7)) drop-shadow(0 2px 3px rgba(0,0,0,0.3));
  animation: starPop 0.5s ease-out;
}
@keyframes starPop {
  0% { transform: scale(0) rotate(-180deg); }
  60% { transform: scale(1.3) rotate(15deg); }
  100% { transform: scale(1) rotate(0); }
}

/* Result card */
.result-card {
  text-align: center;
  padding: 32px 28px;
}
.result-card .verdict {
  font-family: 'Cinzel Decorative', serif;
  font-size: 2.2rem;
  font-weight: 900;
  color: var(--burgundy);
  margin: 14px 0;
}
.result-card .score {
  font-size: 1.3rem;
  color: var(--ink-soft);
  margin-bottom: 8px;
}
.result-card .score strong {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.4rem;
  color: var(--burgundy);
  letter-spacing: 0.05em;
}

/* Battle header */
.battle-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 12px;
}
.battle-header .act-name {
  font-family: 'Cinzel', serif;
  font-weight: 700;
  color: var(--cream);
  font-size: 1rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}
.battle-header .act-name span {
  color: var(--gold-bright);
}

/* SVG coordinate plane */
.svg-coord {
  display: block;
  margin: 0 auto 18px;
  background: var(--cream);
  border: 2px solid var(--gold-deep);
  border-radius: 4px;
  box-shadow: var(--shadow-soft);
}

/* Top nav back link */
.back-link {
  font-family: 'Cinzel', serif;
  font-size: 0.85rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold-bright);
  text-decoration: none;
  border: none;
  background: transparent;
  cursor: pointer;
  padding: 6px 0;
}
.back-link:hover { color: var(--spotlight); }

/* Hub intro paragraph */
.hub-intro {
  text-align: center;
  color: var(--cream);
  font-size: 1.1rem;
  line-height: 1.6;
  max-width: 580px;
  margin: 28px auto 0;
  font-style: italic;
  opacity: 0.92;
}

/* Final battle special poster */
.lesson-poster.final {
  background: linear-gradient(180deg, #2a1015 0%, #4a1320 100%);
  border-color: var(--gold-bright);
  color: var(--cream-warm);
}
.lesson-poster.final.locked {
  filter: grayscale(0.4) brightness(0.6);
}
.lesson-poster.final .act-label,
.lesson-poster.final .lesson-name {
  color: var(--gold-bright);
}
.lesson-poster.final::before, .lesson-poster.final::after {
  color: var(--gold-bright);
}

/* Hidden helper */
.hidden { display: none !important; }

/* Mobile tweaks */
@media (max-width: 540px) {
  .poster { padding: 20px 18px; }
  .question-card .q-prompt { font-size: 1.05rem; }
  .choice { font-size: 0.98rem; padding: 10px 14px; }
  .stars-display .star { font-size: 2.2rem; }
  .result-card .verdict { font-size: 1.6rem; }
  .marquee-bulbs::before, .marquee-bulbs::after { background-size: 16px 10px; height: 10px; }
}

<script>
/* ========================================================================
   STAGE BATTLE — THE GEOMETRY SHOWDOWN
   Single-file artifact: state, question pools, illustrations, render logic.
   ======================================================================== */

/* ---------- STATE ---------- */
const state = {
  screen: 'hub',          // 'hub' | 'playbook' | 'battle' | 'result'
  battleId: null,         // 'b1' | 'b2' | 'b3' | 'final'
  questionIndex: 0,
  questionDraw: [],       // shuffled question objects for current battle
  answers: [],            // array of { correct: bool }
  feedback: null,         // { correct, message }
  awaitingNext: false,    // showing feedback, waiting for "Next"
  completed: { b1: 0, b2: 0, b3: 0, final: 0 }, // best star count
  attempts: { b1: 0, b2: 0, b3: 0, final: 0 },
};

/* ---------- UTILITIES ---------- */
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickN(arr, n) { return shuffle(arr).slice(0, n); }

// Normalize numeric answer strings: accept "1/2", "0.5", ".5", "  0.50  "
function parseNumeric(input) {
  if (input == null) return NaN;
  const s = String(input).trim();
  if (s === '') return NaN;
  if (/^-?\d+\s*\/\s*-?\d+$/.test(s)) {
    const [num, den] = s.split('/').map(t => parseFloat(t.trim()));
    if (den === 0) return NaN;
    return num / den;
  }
  return parseFloat(s);
}

function numericMatches(userInput, correctValue, tolerance = 0.01) {
  const u = parseNumeric(userInput);
  if (Number.isNaN(u)) return false;
  return Math.abs(u - correctValue) < tolerance;
}

function formatFraction(value) {
  // Display helper for explanations
  if (Number.isInteger(value)) return String(value);
  return String(value);
}

/* ---------- SVG: ILLUSTRATIONS (stage-themed, geometric) ---------- */

// Reusable mini coordinate plane renderer for question visuals.
// config: { size, range, shapes:[{points:[[x,y]...], fill, stroke, label?, labels?:[{at:[x,y], text}]}], showAxes }
function svgCoordPlane(config) {
  const size = config.size || 240;
  const range = config.range || 5; // axes from -range to +range
  const margin = 18;
  const inner = size - margin * 2;
  const unit = inner / (range * 2);
  const cx = margin + range * unit;
  const cy = margin + range * unit;
  const xPx = x => margin + (x + range) * unit;
  const yPx = y => margin + (range - y) * unit;

  let svg = `<svg class="svg-coord" viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">`;
  // grid
  for (let i = -range; i <= range; i++) {
    svg += `<line x1="${xPx(i)}" y1="${margin}" x2="${xPx(i)}" y2="${size - margin}" stroke="rgba(107,31,46,0.12)" stroke-width="1"/>`;
    svg += `<line x1="${margin}" y1="${yPx(i)}" x2="${size - margin}" y2="${yPx(i)}" stroke="rgba(107,31,46,0.12)" stroke-width="1"/>`;
  }
  // axes
  svg += `<line x1="${margin}" y1="${cy}" x2="${size - margin}" y2="${cy}" stroke="#6b1f2e" stroke-width="1.6"/>`;
  svg += `<line x1="${cx}" y1="${margin}" x2="${cx}" y2="${size - margin}" stroke="#6b1f2e" stroke-width="1.6"/>`;
  // arrowheads
  svg += `<polygon points="${size-margin},${cy} ${size-margin-6},${cy-4} ${size-margin-6},${cy+4}" fill="#6b1f2e"/>`;
  svg += `<polygon points="${cx},${margin} ${cx-4},${margin+6} ${cx+4},${margin+6}" fill="#6b1f2e"/>`;
  // axis labels
  svg += `<text x="${size-margin+4}" y="${cy+10}" font-family="Cinzel, serif" font-size="9" fill="#6b1f2e">x</text>`;
  svg += `<text x="${cx+5}" y="${margin-2}" font-family="Cinzel, serif" font-size="9" fill="#6b1f2e">y</text>`;
  // tick numbers (every 2 units to reduce clutter)
  for (let i = -range; i <= range; i += Math.max(1, Math.floor(range/4))) {
    if (i === 0) continue;
    svg += `<text x="${xPx(i)}" y="${cy+10}" text-anchor="middle" font-family="Crimson Pro, serif" font-size="8" fill="#3a2424">${i}</text>`;
    svg += `<text x="${cx-5}" y="${yPx(i)+3}" text-anchor="end" font-family="Crimson Pro, serif" font-size="8" fill="#3a2424">${i}</text>`;
  }
  // shapes
  (config.shapes || []).forEach(shape => {
    const pts = shape.points.map(([x,y]) => `${xPx(x)},${yPx(y)}`).join(' ');
    svg += `<polygon points="${pts}" fill="${shape.fill || 'rgba(168,50,74,0.35)'}" stroke="${shape.stroke || '#6b1f2e'}" stroke-width="2" stroke-linejoin="round"/>`;
    // vertex labels
    if (shape.labels) {
      shape.labels.forEach(({at, text}) => {
        const [x,y] = at;
        svg += `<text x="${xPx(x)+5}" y="${yPx(y)-5}" font-family="Cinzel, serif" font-weight="700" font-size="11" fill="${shape.stroke || '#6b1f2e'}">${text}</text>`;
      });
    }
  });
  // extra line annotations
  (config.lines || []).forEach(line => {
    svg += `<line x1="${xPx(line.from[0])}" y1="${yPx(line.from[1])}" x2="${xPx(line.to[0])}" y2="${yPx(line.to[1])}" stroke="${line.stroke || '#a87f4a'}" stroke-width="${line.width || 1.5}" stroke-dasharray="${line.dash || '4 3'}"/>`;
  });
  // points
  (config.points || []).forEach(pt => {
    svg += `<circle cx="${xPx(pt.at[0])}" cy="${yPx(pt.at[1])}" r="3" fill="${pt.fill || '#6b1f2e'}"/>`;
    if (pt.label) {
      svg += `<text x="${xPx(pt.at[0])+6}" y="${yPx(pt.at[1])-6}" font-family="Cinzel, serif" font-weight="700" font-size="11" fill="#6b1f2e">${pt.label}</text>`;
    }
  });

  svg += `</svg>`;
  return svg;
}

};

/* ---------- ROUTING / NAVIGATION ---------- */
function go(screen, opts = {}) {
  state.screen = screen;
  if (opts.battleId !== undefined) state.battleId = opts.battleId;
  if (opts.questionIndex !== undefined) state.questionIndex = opts.questionIndex;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function startBattle(battleId, skipPlaybook = false) {
  state.battleId = battleId;
  state.attempts[battleId]++;
  const pool = BATTLES[battleId].pool();
  state.questionDraw = pickN(pool, 5);
  state.questionIndex = 0;
  state.answers = [];
  state.feedback = null;
  state.awaitingNext = false;
  // First-time players see the playbook; on retries, can skip
  if (!skipPlaybook && battleId !== 'final' && state.attempts[battleId] === 1) {
    go('playbook');
  } else {
    go('battle');
  }
}

function goToPlaybookFromBattle() {
  go('playbook');
}

function submitAnswer(value) {
  const q = state.questionDraw[state.questionIndex];
  let correct = false;
  if (q.type === 'mc') {
    correct = (value === q.answerIndex);
  } else if (q.type === 'num') {
    correct = q.accept ? q.accept(value) : numericMatches(value, q.answer);
  } else if (q.type === 'coord') {
    // value is { x, y }
    correct = numericMatches(value.x, q.answer[0]) && numericMatches(value.y, q.answer[1]);
  }
  state.answers.push({ correct });
  state.feedback = { correct, message: q.explain };
  state.awaitingNext = true;
  render();
}

function nextQuestion() {
  state.feedback = null;
  state.awaitingNext = false;
  if (state.questionIndex + 1 >= state.questionDraw.length) {
    // Battle over — record stars
    const stars = state.answers.filter(a => a.correct).length;
    if (stars > state.completed[state.battleId]) {
      state.completed[state.battleId] = stars;
    }
    go('result');
  } else {
    state.questionIndex++;
    render();
  }
}

function allBattlesCompleted() {
  return state.completed.b1 > 0 && state.completed.b2 > 0 && state.completed.b3 > 0;
}

/* ---------- RENDERERS ---------- */
function renderHub() {
  const finalLocked = !allBattlesCompleted();
  const finalCleared = state.completed.final > 0;
  const battleCard = (id, status) => {
    const meta = BATTLES[id];
    const stars = state.completed[id];
    const completed = stars > 0;
    const isFinal = id === 'final';
    const locked = isFinal && finalLocked;
    const cls = `lesson-poster ${isFinal ? 'final' : ''} ${locked ? 'locked' : ''}`;
    return `
      <div class="${cls}" ${locked ? '' : `onclick="startBattle('${id}', false)"`} role="button" tabindex="${locked ? -1 : 0}" aria-label="${meta.title}, ${locked ? 'locked' : (completed ? `${stars} of 5 stars` : 'not yet attempted')}">
        <div class="act-label">${meta.actLabel}</div>
        <div class="lesson-name">${meta.title}</div>
        <div class="lesson-illustration">${locked ? '<div class="lock-icon">🔒</div>' : ILLUSTRATIONS[meta.illustration]}</div>
        ${locked
          ? `<div style="font-family:'Cinzel',serif; font-size:0.8rem; color:var(--gold-deep); letter-spacing:0.15em; text-align:center;">CLEAR ALL THREE ACTS<br/>TO UNLOCK</div>`
          : `<div class="stars-row">${renderStarsInline(stars, 5)}</div>
             <div class="status-pill ${completed ? 'complete' : 'new'}">${completed ? `BEST: ${stars}/5` : 'NEW'}</div>`}
      </div>`;
  };

  return `
    <div class="spotlight"></div>
    <h1 class="marquee-title huge">Stage Battle</h1>
    <div class="subtitle">★ The Geometry Showdown ★</div>
    <p class="hub-intro">Three acts of transformation mathematics. Master each one to unlock the Grand Finale. Every battle reshuffles, so no two performances are alike.</p>
    <div class="posters-grid">
      ${battleCard('b1')}
      ${battleCard('b2')}
      ${battleCard('b3')}
      ${battleCard('final')}
    </div>
  `;
}

function renderStarsInline(filled, total) {
  let s = '';
  for (let i = 0; i < total; i++) {
    s += `<span class="${i < filled ? 'filled' : 'empty'}">★</span>`;
  }
  return s;
}

function renderBattle() {
  const meta = BATTLES[state.battleId];
  const q = state.questionDraw[state.questionIndex];
  const total = state.questionDraw.length;
  const idx = state.questionIndex;
  const showingFeedback = state.awaitingNext;

  // Progress bulbs
  let bulbs = '';
  for (let i = 0; i < total; i++) {
    let cls = 'bulb';
    if (i < idx) cls += ' lit';
    else if (i === idx && !showingFeedback) cls += ' current';
    else if (i === idx && showingFeedback) cls += state.answers[idx].correct ? ' lit' : '';
    bulbs += `<div class="${cls}"></div>`;
  }

  // Visual SVG (if any)
  let visualHtml = '';
  if (q.visual && q.visual.kind === 'plane') {
    visualHtml = svgCoordPlane(q.visual.config);
  }

  // Question body — depends on type
  let answerArea = '';
  if (q.type === 'mc') {
    answerArea = `<div class="choices">
      ${q.choices.map((choice, i) => {
        let cls = 'choice';
        if (showingFeedback) {
          if (i === q.answerIndex) cls += ' correct';
          else if (state.answers[idx] && !state.answers[idx].correct && state.lastMcPick === i) cls += ' incorrect';
        }
        const letter = String.fromCharCode(65 + i);
        return `<button class="${cls}" ${showingFeedback ? 'disabled' : ''} onclick="handleMcClick(${i})">
          <span class="choice-letter">${letter}</span>
          <span>${choice}</span>
        </button>`;
      }).join('')}
    </div>`;
  } else if (q.type === 'num') {
    const val = state.lastNumInput || '';
    const cls = showingFeedback ? (state.answers[idx].correct ? 'numeric-input correct' : 'numeric-input incorrect') : 'numeric-input';
    answerArea = `<div class="numeric-row">
      <input type="text" id="numInput" class="${cls}" value="${val}" placeholder="?" ${showingFeedback ? 'disabled' : ''} onkeydown="handleNumKey(event)" autocomplete="off" inputmode="decimal" />
      ${q.suffix ? `<span style="font-family:'Cinzel',serif; font-size:1.1rem; color:var(--burgundy);">${q.suffix}</span>` : ''}
      ${!showingFeedback ? `<button class="btn btn-primary" style="padding:10px 20px;" onclick="handleNumSubmit()">Submit</button>` : ''}
    </div>`;
  } else if (q.type === 'coord') {
    const vx = state.lastCoordInput?.x || '';
    const vy = state.lastCoordInput?.y || '';
    const correctClass = showingFeedback ? (state.answers[idx].correct ? 'correct' : 'incorrect') : '';
    answerArea = `<div class="coord-row">
      <span>(</span>
      <input type="text" id="coordX" class="numeric-input ${correctClass}" value="${vx}" placeholder="x" ${showingFeedback ? 'disabled' : ''} onkeydown="handleCoordKey(event)" autocomplete="off" inputmode="decimal" />
      <span>,</span>
      <input type="text" id="coordY" class="numeric-input ${correctClass}" value="${vy}" placeholder="y" ${showingFeedback ? 'disabled' : ''} onkeydown="handleCoordKey(event)" autocomplete="off" inputmode="decimal" />
      <span>)</span>
      ${!showingFeedback ? `<button class="btn btn-primary" style="padding:10px 20px;" onclick="handleCoordSubmit()">Submit</button>` : ''}
    </div>`;
  }

  // Feedback area
  let feedbackHtml = '';
  if (showingFeedback) {
    const f = state.feedback;
    let correctAnswerText = '';
    if (!f.correct) {
      if (q.type === 'mc') correctAnswerText = `Correct answer: <strong>${q.choices[q.answerIndex]}</strong>. `;
      else if (q.type === 'num') correctAnswerText = `Correct answer: <strong>${q.answer}${q.suffix ? ' ' + q.suffix : ''}</strong>. `;
      else if (q.type === 'coord') correctAnswerText = `Correct answer: <strong>(${q.answer[0]}, ${q.answer[1]})</strong>. `;
    }
    feedbackHtml = `
      <div class="feedback ${f.correct ? 'correct' : 'incorrect'}">
        <div class="icon">${f.correct ? '★' : '✗'}</div>
        <div class="text">
          <strong>${f.correct ? 'Bravo!' : 'Not quite.'}</strong>
          ${correctAnswerText ? '<br/>' + correctAnswerText : ' '}
          ${f.message}
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="nextQuestion()">${state.questionIndex + 1 >= total ? 'Finish ▸' : 'Next ▸'}</button>
      </div>
    `;
  }

  return `
    <div class="battle-header">
      <div class="act-name"><span>${meta.actLabel}</span> · ${meta.title}</div>
      <button class="back-link" onclick="confirmExitBattle()">↩ Exit Battle</button>
    </div>
    <h1 class="marquee-title big">${meta.title}</h1>
    <div class="progress-bulbs">${bulbs}</div>
    <div class="poster question-card">
      <div class="q-number">Question ${idx + 1} of ${total}</div>
      <div class="q-prompt">${q.prompt}</div>
      ${visualHtml}
      ${answerArea}
      ${feedbackHtml}
    </div>
    ${state.battleId !== 'final' ? `
      <div style="text-align:center; margin-top:18px;">
        <button class="btn-ghost btn" style="font-size:0.8rem; padding:8px 16px;" onclick="goToPlaybookFromBattle()">📖 View Playbook</button>
      </div>` : ''}
  `;
}

function confirmExitBattle() {
  if (state.questionIndex > 0 || state.answers.length > 0) {
    if (!confirm('Exit this battle? Your progress in this round will be lost.')) return;
  }
  go('hub');
}

function renderResult() {
  const meta = BATTLES[state.battleId];
  const stars = state.answers.filter(a => a.correct).length;
  const total = state.answers.length;
  let verdict;
  if (stars === 5) verdict = 'Standing Ovation!';
  else if (stars === 4) verdict = 'Encore Worthy!';
  else if (stars === 3) verdict = 'A Solid Show.';
  else if (stars === 2) verdict = 'The Curtain Falls.';
  else if (stars === 1) verdict = 'A Rough Night.';
  else verdict = 'Back to Rehearsal.';

  const isFinal = state.battleId === 'final';
  const allDone = allBattlesCompleted();
  const justUnlockedFinal = !isFinal && allDone && state.completed.final === 0 && stars > 0;

  let starsHtml = '';
  for (let i = 0; i < 5; i++) {
    starsHtml += `<span class="star ${i < stars ? 'filled' : ''}" style="animation-delay: ${i * 0.15}s">★</span>`;
  }

  return `
    <div class="spotlight"></div>
    <div class="subtitle">${meta.actLabel} · Curtain Call</div>
    <h1 class="marquee-title big" style="margin-top:8px;">${meta.title}</h1>
    <div class="poster result-card" style="margin-top: 28px;">
      <div class="stars-display">${starsHtml}</div>
      <div class="verdict">${verdict}</div>
      <div class="score">You scored <strong>${stars}</strong> out of <strong>${total}</strong></div>
      ${justUnlockedFinal ? `<div style="margin-top:18px; padding:14px; background:rgba(255,224,102,0.25); border:2px dashed var(--gold-deep); border-radius:6px; font-family:'Cinzel',serif; color:var(--burgundy);">🔓 <strong>The Grand Finale is unlocked!</strong></div>` : ''}
      <div class="btn-row">
        <button class="btn btn-primary" onclick="startBattle('${state.battleId}', true)">⟲ Retry Battle</button>
        <button class="btn btn-secondary" onclick="go('hub')">← Marquee</button>
      </div>
    </div>
  `;
}

/* ---------- INPUT HANDLERS ---------- */
function handleMcClick(i) {
  state.lastMcPick = i;
  submitAnswer(i);
}
function handleNumSubmit() {
  const el = document.getElementById('numInput');
  const v = el ? el.value : '';
  state.lastNumInput = v;
  submitAnswer(v);
}
function handleNumKey(e) {
  if (e.key === 'Enter') { e.preventDefault(); handleNumSubmit(); }
}
function handleCoordSubmit() {
  const x = document.getElementById('coordX')?.value || '';
  const y = document.getElementById('coordY')?.value || '';
  state.lastCoordInput = { x, y };
  submitAnswer({ x, y });
}
function handleCoordKey(e) {
  if (e.key === 'Enter') { e.preventDefault(); handleCoordSubmit(); }
  if (e.key === 'Tab' && e.target.id === 'coordX' && !e.shiftKey) {
    // Let default Tab behavior happen
  }
}

/* ---------- MAIN RENDER ---------- */
function render() {
  const app = document.getElementById('app');
  // Reset transient input state when entering new question
  if (state.screen === 'battle' && !state.awaitingNext) {
    state.lastMcPick = undefined;
    state.lastNumInput = '';
    state.lastCoordInput = { x: '', y: '' };
  }
  let html = '';
  if (state.screen === 'hub') html = renderHub();
  else if (state.screen === 'playbook') html = renderPlaybook();
  else if (state.screen === 'battle') html = renderBattle();
  else if (state.screen === 'result') html = renderResult();
  app.innerHTML = html;

  // Auto-focus inputs
  if (state.screen === 'battle' && !state.awaitingNext) {
    const q = state.questionDraw[state.questionIndex];
    setTimeout(() => {
      if (q.type === 'num') document.getElementById('numInput')?.focus();
      else if (q.type === 'coord') document.getElementById('coordX')?.focus();
    }, 50);
  }
}

// First render
render();

</script>
</body>
</html>
