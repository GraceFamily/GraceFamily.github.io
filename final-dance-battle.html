<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dance Battle — The Geometry Showcase</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@500;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --burgundy: #6b1f2e;
  --burgundy-deep: #4a1320;
  --burgundy-light: #8a2a3d;
  --gold: #d4a574;
  --gold-bright: #f4c97a;
  --gold-deep: #a87f4a;
  --cream: #f5ecd7;
  --cream-warm: #faf2dd;
  --parchment: #ede0c4;
  --spotlight: #ffe066;
  --ink: #1a0e0e;
  --ink-soft: #3a2424;
  --stage-red: #a8324a;
  --success: #4a7c59;
  --error: #8b2c2c;
  --grid-line: rgba(107, 31, 46, 0.18);
  --shadow-deep: 0 12px 32px rgba(26, 14, 14, 0.35);
  --shadow-soft: 0 4px 14px rgba(26, 14, 14, 0.18);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  min-height: 100vh;
  font-family: 'Crimson Pro', Georgia, serif;
  color: var(--ink);
  background:
    radial-gradient(ellipse at top, var(--burgundy-light) 0%, var(--burgundy) 35%, var(--burgundy-deep) 100%);
  background-attachment: fixed;
  overflow-x: hidden;
}

.curtain-side {
  position: fixed;
  top: 0; bottom: 0;
  width: 60px;
  background:
    repeating-linear-gradient(90deg,
      var(--burgundy-deep) 0px,
      var(--burgundy) 8px,
      var(--burgundy-light) 14px,
      var(--burgundy) 22px,
      var(--burgundy-deep) 30px
    );
  box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
  z-index: 1;
  pointer-events: none;
}
.curtain-side.left { left: 0; }
.curtain-side.right { right: 0; }
@media (max-width: 720px) {
  .curtain-side { width: 24px; }
}

.stage {
  position: relative;
  z-index: 2;
  max-width: 1100px;
  margin: 0 auto;
  padding: 40px 80px 60px;
  min-height: 100vh;
}
@media (max-width: 720px) {
  .stage { padding: 24px 36px 40px; }
}

.spotlight {
  position: absolute;
  top: -50px; left: 50%;
  transform: translateX(-50%);
  width: 800px; height: 400px;
  background: radial-gradient(ellipse at center top, rgba(255, 224, 102, 0.25) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.marquee-title {
  font-family: 'Cinzel Decorative', serif;
  font-weight: 900;
  text-align: center;
  color: var(--gold-bright);
  text-shadow:
    0 2px 0 var(--gold-deep),
    0 4px 12px rgba(0,0,0,0.5),
    0 0 30px rgba(255, 224, 102, 0.3);
  letter-spacing: 0.04em;
  line-height: 1.05;
  position: relative;
  z-index: 1;
}
.marquee-title.huge { font-size: clamp(2.2rem, 6vw, 4rem); }
.marquee-title.big { font-size: clamp(1.6rem, 4vw, 2.6rem); }
.marquee-title.med { font-size: clamp(1.2rem, 3vw, 1.8rem); }

.subtitle {
  text-align: center;
  font-family: 'Cinzel', serif;
  font-weight: 500;
  color: var(--cream);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-size: 0.85rem;
  margin-top: 12px;
  opacity: 0.85;
}

.part-header {
  text-align: center;
  font-family: 'Cinzel Decorative', serif;
  font-weight: 700;
  font-size: clamp(0.95rem, 2.2vw, 1.15rem);
  letter-spacing: 0.3em;
  color: var(--gold-bright);
  text-shadow: 0 2px 8px rgba(0,0,0,0.4);
  margin: 40px 0 0;
  padding: 14px 0;
  border-top: 1px solid rgba(212, 165, 116, 0.35);
  border-bottom: 1px solid rgba(212, 165, 116, 0.35);
}

.poster {
  background: linear-gradient(180deg, var(--cream-warm) 0%, var(--parchment) 100%);
  border: 3px solid var(--gold-deep);
  border-radius: 8px;
  padding: 28px;
  box-shadow:
    var(--shadow-deep),
    inset 0 0 0 1px var(--gold-bright),
    inset 0 0 30px rgba(212, 165, 116, 0.15);
  position: relative;
}
.poster::before, .poster::after {
  content: '✦';
  position: absolute;
  font-size: 1.4rem;
  color: var(--gold-deep);
  top: 8px;
}
.poster::before { left: 14px; }
.poster::after { right: 14px; }

.posters-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 24px;
  margin-top: 24px;
}
.posters-grid.finale-grid {
  grid-template-columns: minmax(260px, 460px);
  justify-content: center;
}

.lesson-poster {
  background: linear-gradient(180deg, var(--cream-warm) 0%, var(--parchment) 100%);
  border: 3px solid var(--gold-deep);
  border-radius: 6px;
  padding: 22px 18px;
  box-shadow: var(--shadow-deep), inset 0 0 0 1px var(--gold-bright);
  cursor: pointer;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.lesson-poster:hover:not(.locked) {
  transform: translateY(-6px);
  box-shadow: 0 18px 40px rgba(0,0,0,0.45), inset 0 0 0 1px var(--gold-bright);
}
.lesson-poster.locked {
  cursor: not-allowed;
  filter: grayscale(0.6) brightness(0.75);
}
.lesson-poster .act-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 0.3em;
  color: var(--burgundy);
  margin-bottom: 4px;
}
.lesson-poster .lesson-name {
  font-family: 'Cinzel', serif;
  font-weight: 700;
  font-size: 1.15rem;
  color: var(--ink);
  margin-bottom: 4px;
  line-height: 1.2;
}
.lesson-poster .lesson-sub {
  font-family: 'Crimson Pro', serif;
  font-style: italic;
  font-size: 0.85rem;
  color: var(--ink-soft);
  margin-bottom: 12px;
  opacity: 0.75;
}
.lesson-poster .lesson-illustration {
  width: 100%;
  height: 130px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.lesson-poster .stars-row {
  margin-top: auto;
  font-size: 1.1rem;
  letter-spacing: 0.15em;
  color: var(--gold-deep);
}
.lesson-poster .stars-row .filled { color: var(--gold-bright); text-shadow: 0 0 8px rgba(255, 224, 102, 0.6); }
.lesson-poster .stars-row .empty { color: rgba(168, 127, 74, 0.35); }
.lesson-poster .status-pill {
  display: inline-block;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.75rem;
  letter-spacing: 0.2em;
  padding: 3px 10px;
  border-radius: 12px;
  margin-top: 8px;
}
.lesson-poster .status-pill.complete {
  background: var(--burgundy);

}
.lesson-poster .status-pill.new {
  background: var(--gold-bright);
  color: var(--ink);
}
.lock-icon {
  font-size: 2rem;
  color: var(--gold-deep);

}

.btn {
  font-family: 'Cinzel', serif;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-size: 0.95rem;
  padding: 14px 28px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s ease;

}
.btn-primary {
  background: linear-gradient(180deg, var(--stage-red) 0%, var(--burgundy) 100%);

.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 0 var(--burgundy-deep), var(--shadow-deep); }
.btn-primary:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--burgundy-deep); }
.btn-secondary {

.btn-secondary:hover { transform: translateY(-1px); box-shadow: 0 4px 0 var(--burgundy); }

.btn-ghost {

.btn-ghost:hover { background: rgba(255,255,255,0.08); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

.btn-row {

.playbook-section { margin-top: 22px; }
.playbook-section h3 {

.playbook-section p, .playbook-section li {

.playbook-section ul, .playbook-section ol { padding-left: 22px; }
.playbook-section ul li, .playbook-section ol li { margin-bottom: 6px; }
.playbook-section code {
  font-family: 'Bebas Neue', sans-serif;
  background: var(--burgundy);
  color: var(--gold-bright);

.worked-example {

  padding: 14px 18px;

.worked-example .ex-label {
  font-family: 'Cinzel', serif;
  font-weight: 700;
  font-size: 0.8rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold-deep);
  margin-bottom: 6px;
}

.watch-out {
  background: linear-gradient(180deg, #fff5d6 0%, #f9e8b5 100%);

  padding: 16px 20px;
  margin: 16px 0;
  border-radius: 6px;
  position: relative;

.watch-out::before {
  content: '⚠ WATCH OUT';

  top: -12px; left: 16px;
  background: var(--burgundy);
  color: var(--gold-bright);

  letter-spacing: 0.25em;
  padding: 3px 12px;

.question-card { margin-top: 24px; }
.question-card .q-number {

  font-size: 1.05rem;
  letter-spacing: 0.3em;

  margin-bottom: 8px;

.question-card .q-prompt {

  margin-bottom: 18px;

.question-card .q-prompt code {
  font-family: 'Bebas Neue', sans-serif;
  background: var(--burgundy);
  color: var(--gold-bright);

  border-radius: 3px;
  letter-spacing: 0.05em;

.choices { display: grid; gap: 10px; }
.choice {
  background: var(--cream-warm);
  border: 2px solid var(--gold-deep);
  border-radius: 4px;
  padding: 12px 18px;
  font-family: 'Crimson Pro', Georgia, serif;
  font-size: 1.05rem;
  color: var(--ink);
  cursor: pointer;
  transition: all 0.18s ease;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 14px;
}
.choice:hover:not(:disabled) {

  border-color: var(--burgundy);
  transform: translateX(3px);
}
.choice .choice-letter {
  font-family: 'Cinzel', serif;
  font-weight: 700;
  background: var(--burgundy);
  color: var(--gold-bright);
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  flex-shrink: 0;
}
.choice.correct { background: #d4e8d8; border-color: var(--success); }
.choice.correct .choice-letter { background: var(--success); }
.choice.incorrect { background: #f0d2d2; border-color: var(--error); }
.choice.incorrect .choice-letter { background: var(--error); }

.numeric-input {
  font-family: 'Cinzel', serif;
  font-size: 1.4rem;
  font-weight: 600;
  padding: 12px 18px;

  border-radius: 4px;

.numeric-input:focus { border-color: var(--burgundy); box-shadow: 0 0 0 3px rgba(168, 50, 74, 0.2); }
.numeric-input.correct { background: #d4e8d8; border-color: var(--success); color: var(--success); }
.numeric-input.incorrect { background: #f0d2d2; border-color: var(--error); color: var(--error); }
.numeric-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.coord-row { display: flex; align-items: center; gap: 10px; font-family: 'Cinzel', serif; font-size: 1.6rem; color: var(--burgundy); flex-wrap: wrap; }
.coord-row .numeric-input { width: 90px; font-size: 1.2rem; }

.feedback {
  margin-top: 16px;
  padding: 14px 18px;
  border-radius: 4px;
  font-size: 1.05rem;

  gap: 12px;
  align-items: flex-start;

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}
.feedback.correct { background: linear-gradient(180deg, #d4e8d8 0%, #b8d8be 100%); border-left: 5px solid var(--success); color: #1f3d2a; }
.feedback.incorrect { background: linear-gradient(180deg, #f0d2d2 0%, #e0b8b8 100%); border-left: 5px solid var(--error); color: #3d1a1a; }
.feedback .icon { font-size: 1.4rem; flex-shrink: 0; line-height: 1.2; }
.feedback .text strong { font-family: 'Cinzel', serif; letter-spacing: 0.05em; }

.progress-bulbs { display: flex; justify-content: center; gap: 12px; margin: 18px 0 6px; flex-wrap: wrap; }
.bulb {
  width: 22px; height: 22px;

.bulb.lit { background: radial-gradient(circle at 30% 30%, var(--spotlight), var(--gold-bright) 60%, var(--gold-deep) 100%); box-shadow: 0 0 14px var(--spotlight), 0 0 4px #fff inset; }
.bulb.current { background: radial-gradient(circle at 30% 30%, #fff, var(--spotlight) 50%, var(--gold) 100%); box-shadow: 0 0 18px var(--spotlight); animation: pulse 1.4s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }

.stars-display { display: flex; justify-content: center; gap: 8px; margin: 20px 0; }
.star { font-size: 3rem; color: rgba(168, 127, 74, 0.3); transition: all 0.3s ease; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }

@keyframes starPop { 0% { transform: scale(0) rotate(-180deg); } 60% { transform: scale(1.3) rotate(15deg); } 100% { transform: scale(1) rotate(0); } }

.result-card { text-align: center; padding: 32px 28px; }
.result-card .verdict { font-family: 'Cinzel Decorative', serif; font-size: 2.2rem; font-weight: 900; color: var(--burgundy); margin: 14px 0; }
.result-card .score { font-size: 1.3rem; color: var(--ink-soft); margin-bottom: 8px; }
.result-card .score strong { font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; color: var(--burgundy); letter-spacing: 0.05em; }

.battle-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
.battle-header .act-name { font-family: 'Cinzel', serif; font-weight: 700; color: var(--cream); font-size: 1rem; letter-spacing: 0.2em; text-transform: uppercase; }
.battle-header .act-name span { color: var(--gold-bright); }

.svg-coord { display: block; margin: 0 auto 18px; background: var(--cream); border: 2px solid var(--gold-deep); border-radius: 4px; box-shadow: var(--shadow-soft); }

.back-link { font-family: 'Cinzel', serif; font-size: 0.85rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold-bright); text-decoration: none; border: none; background: transparent; cursor: pointer; padding: 6px 0; }
.back-link:hover { color: var(--spotlight); }

.hub-intro { text-align: center; color: var(--cream); font-size: 1.1rem; line-height: 1.6; max-width: 620px; margin: 28px auto 0; font-style: italic; opacity: 0.92; }

.lesson-poster.final {

  border-color: var(--gold-bright);
  color: var(--cream-warm);

.lesson-poster.final .act-label,
.lesson-poster.final .lesson-name,
.lesson-poster.final .lesson-sub { color: var(--gold-bright); }

@media (max-width: 540px) {
  .poster { padding: 20px 18px; }
  .question-card .q-prompt { font-size: 1.05rem; }
  .choice { font-size: 0.98rem; padding: 10px 14px; }
  .stars-display .star { font-size: 2.2rem; }
  .result-card .verdict { font-size: 1.6rem; }
  .progress-bulbs .bulb { width: 16px; height: 16px; }

<script>
/* ========================================================================
   DANCE BATTLE — THE GEOMETRY SHOWCASE
   Six acts of geometric transformations + a Grand Finale.
   ======================================================================== */

/* ---------- STATE ---------- */
const state = {
  screen: 'hub',
  battleId: null,
  questionIndex: 0,
  questionDraw: [],
  answers: [],
  feedback: null,
  awaitingNext: false,
  completed: { a1: 0, a2: 0, a3: 0, a4: 0, a5: 0, a6: 0, final: 0 },
  bestScore: { a1: 0, a2: 0, a3: 0, a4: 0, a5: 0, a6: 0, final: 0 },
  attempts: { a1: 0, a2: 0, a3: 0, a4: 0, a5: 0, a6: 0, final: 0 },
};

/* ---------- UTILITIES ---------- */
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pickN(arr, n) { return shuffle(arr).slice(0, n); }

function parseNumeric(input) {
  if (input == null) return NaN;
  const s = String(input).trim();
  if (s === '') return NaN;
  if (/^-?\d+\s*\/\s*-?\d+$/.test(s)) {
    const [num, den] = s.split('/').map(t => parseFloat(t.trim()));
    if (den === 0) return NaN;
    return num / den;
  }
  return parseFloat(s);
}
function numericMatches(userInput, correctValue, tolerance = 0.01) {
  const u = parseNumeric(userInput);
  if (Number.isNaN(u)) return false;
  return Math.abs(u - correctValue) < tolerance;
}

/* For finale (12 questions), map raw correct count to a 5-star scale.
   For 5-question battles, stars = correct count. */
function calculateStars(correct, total) {
  if (total <= 5) return correct;
  const pct = correct / total;
  if (pct >= 1) return 5;
  if (pct >= 0.83) return 4;   // 10–11 of 12
  if (pct >= 0.66) return 3;   // 8–9 of 12
  if (pct >= 0.5) return 2;    // 6–7 of 12
  if (pct >= 0.33) return 1;   // 4–5 of 12
  return 0;
}

/* ---------- SVG: COORDINATE PLANE ---------- */
function svgCoordPlane(config) {
  const size = config.size || 240;
  const range = config.range || 5;
  const margin = 18;
  const inner = size - margin * 2;
  const unit = inner / (range * 2);
  const cx = margin + range * unit;
  const cy = margin + range * unit;
  const xPx = x => margin + (x + range) * unit;
  const yPx = y => margin + (range - y) * unit;

  let svg = `<svg class="svg-coord" viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">`;
  // grid
  for (let i = -range; i <= range; i++) {
    svg += `<line x1="${xPx(i)}" y1="${margin}" x2="${xPx(i)}" y2="${size - margin}" stroke="rgba(107,31,46,0.12)" stroke-width="1"/>`;
    svg += `<line x1="${margin}" y1="${yPx(i)}" x2="${size - margin}" y2="${yPx(i)}" stroke="rgba(107,31,46,0.12)" stroke-width="1"/>`;
  }
  // axes
  svg += `<line x1="${margin}" y1="${cy}" x2="${size - margin}" y2="${cy}" stroke="#6b1f2e" stroke-width="1.6"/>`;
  svg += `<line x1="${cx}" y1="${margin}" x2="${cx}" y2="${size - margin}" stroke="#6b1f2e" stroke-width="1.6"/>`;
  // arrowheads
  svg += `<polygon points="${size-margin},${cy} ${size-margin-6},${cy-4} ${size-margin-6},${cy+4}" fill="#6b1f2e"/>`;
  svg += `<polygon points="${cx},${margin} ${cx-4},${margin+6} ${cx+4},${margin+6}" fill="#6b1f2e"/>`;
  // axis labels
  svg += `<text x="${size-margin+4}" y="${cy+10}" font-family="Cinzel, serif" font-size="9" fill="#6b1f2e">x</text>`;
  svg += `<text x="${cx+5}" y="${margin-2}" font-family="Cinzel, serif" font-size="9" fill="#6b1f2e">y</text>`;
  // tick numbers
  const tickStep = Math.max(1, Math.floor(range/4));
  for (let i = -range; i <= range; i += tickStep) {
    if (i === 0) continue;
    svg += `<text x="${xPx(i)}" y="${cy+10}" text-anchor="middle" font-family="Crimson Pro, serif" font-size="8" fill="#3a2424">${i}</text>`;
    svg += `<text x="${cx-5}" y="${yPx(i)+3}" text-anchor="end" font-family="Crimson Pro, serif" font-size="8" fill="#3a2424">${i}</text>`;
  }
  // mirror lines (for reflections)
  (config.mirrorLines || []).forEach(ml => {
    if (ml.axis === 'h') {
      svg += `<line x1="${margin}" y1="${yPx(ml.value)}" x2="${size - margin}" y2="${yPx(ml.value)}" stroke="#4a7c59" stroke-width="1.8" stroke-dasharray="5 3" opacity="0.9"/>`;
      if (ml.label) svg += `<text x="${size - margin - 4}" y="${yPx(ml.value) - 4}" font-size="9" fill="#2f5e3e" text-anchor="end" font-style="italic" font-weight="700">${ml.label}</text>`;
    } else if (ml.axis === 'v') {
      svg += `<line x1="${xPx(ml.value)}" y1="${margin}" x2="${xPx(ml.value)}" y2="${size - margin}" stroke="#4a7c59" stroke-width="1.8" stroke-dasharray="5 3" opacity="0.9"/>`;
      if (ml.label) svg += `<text x="${xPx(ml.value) + 4}" y="${margin + 10}" font-size="9" fill="#2f5e3e" font-style="italic" font-weight="700">${ml.label}</text>`;
    }
  });
  // center of rotation marker (origin)
  if (config.centerOfRotation) {
    svg += `<circle cx="${cx}" cy="${cy}" r="4" fill="#d4a574"/>`;
    svg += `<circle cx="${cx}" cy="${cy}" r="8" fill="none" stroke="#a87f4a" stroke-width="1.2" opacity="0.7"/>`;
  }
  // shapes
  (config.shapes || []).forEach(shape => {
    const pts = shape.points.map(([x,y]) => `${xPx(x)},${yPx(y)}`).join(' ');
    svg += `<polygon points="${pts}" fill="${shape.fill || 'rgba(168,50,74,0.35)'}" stroke="${shape.stroke || '#6b1f2e'}" stroke-width="2" stroke-linejoin="round"/>`;
    if (shape.labels) {
      shape.labels.forEach(({at, text}) => {
        const [x,y] = at;
        svg += `<text x="${xPx(x)+5}" y="${yPx(y)-5}" font-family="Cinzel, serif" font-weight="700" font-size="11" fill="${shape.stroke || '#6b1f2e'}">${text}</text>`;
      });
    }
  });
  // extra line annotations
  (config.lines || []).forEach(line => {
    svg += `<line x1="${xPx(line.from[0])}" y1="${yPx(line.from[1])}" x2="${xPx(line.to[0])}" y2="${yPx(line.to[1])}" stroke="${line.stroke || '#a87f4a'}" stroke-width="${line.width || 1.5}" stroke-dasharray="${line.dash || '4 3'}"/>`;
  });
  // points
  (config.points || []).forEach(pt => {
    svg += `<circle cx="${xPx(pt.at[0])}" cy="${yPx(pt.at[1])}" r="4" fill="${pt.fill || '#6b1f2e'}" stroke="#fff" stroke-width="1"/>`;
    if (pt.label) {
      svg += `<text x="${xPx(pt.at[0])+7}" y="${yPx(pt.at[1])-6}" font-family="Cinzel, serif" font-weight="700" font-size="11" fill="${pt.fill || '#6b1f2e'}">${pt.label}</text>`;
    }
  });

  svg += `</svg>`;
  return svg;
}

      { label:'Worked Example 2',
        body:'Map scale: 1 in = 50 mi. Distance on map = 3 in. → Real distance = 3 × 50 = <strong>150 miles</strong>.' }
    ],
    watchOut: 'Similar ≠ congruent in general, but <strong>congruent figures ARE similar</strong> (with scale factor 1). Similar figures must have the same SHAPE, but not necessarily the same SIZE.'
  }
};

/* ---------- BATTLE METADATA ---------- */
const BATTLES = {
  a1: { title:'The Slide', actLabel:'Act I', pool:() => POOL_A1, illustration:'a1', subtitle:'Translations' },
  a2: { title:'The Mirror', actLabel:'Act II', pool:() => POOL_A2, illustration:'a2', subtitle:'Reflections' },
  a3: { title:'The Pirouette', actLabel:'Act III', pool:() => POOL_A3, illustration:'a3', subtitle:'Rotations' },
  a4: { title:'Congruent Figures', actLabel:'Act IV', pool:() => POOL_A4, illustration:'a4', subtitle:'Mirrored Performers' },
  a5: { title:'Dilations', actLabel:'Act V', pool:() => POOL_A5, illustration:'a5', subtitle:'Grand & Petite' },
  a6: { title:'Similar Figures', actLabel:'Act VI', pool:() => POOL_A6, illustration:'a6', subtitle:'Shape in Trio' },
  final: { title:'Grand Finale', actLabel:'Finale', pool:() => null, illustration:'final', subtitle:'All Acts Combined' }
};

/* For finale: 2 random questions from each of the 6 act pools, then shuffled together */
function drawFinale() {
  const draw = [];
  ['a1','a2','a3','a4','a5','a6'].forEach(id => {
    draw.push(...pickN(BATTLES[id].pool(), 2));
  });
  return shuffle(draw);
}

/* ---------- ROUTING ---------- */
function go(screen, opts = {}) {
  state.screen = screen;
  if (opts.battleId !== undefined) state.battleId = opts.battleId;
  if (opts.questionIndex !== undefined) state.questionIndex = opts.questionIndex;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function startBattle(battleId, skipPlaybook = false) {
  state.battleId = battleId;
  state.attempts[battleId]++;
  if (battleId === 'final') {
    state.questionDraw = drawFinale();
  } else {
    state.questionDraw = pickN(BATTLES[battleId].pool(), 5);
  }
  state.questionIndex = 0;
  state.answers = [];
  state.feedback = null;
  state.awaitingNext = false;
  // First-time players see the playbook; on retries, can skip. Finale has no playbook.
  if (!skipPlaybook && battleId !== 'final' && state.attempts[battleId] === 1) {
    go('playbook');
  } else {
    go('battle');
  }
}

function goToPlaybookFromBattle() {
  go('playbook');
}

function submitAnswer(value) {
  const q = state.questionDraw[state.questionIndex];
  let correct = false;
  if (q.type === 'mc') {
    correct = (value === q.answerIndex);
  } else if (q.type === 'num') {
    correct = q.accept ? q.accept(value) : numericMatches(value, q.answer);
  } else if (q.type === 'coord') {
    correct = numericMatches(value.x, q.answer[0]) && numericMatches(value.y, q.answer[1]);
  }
  state.answers.push({ correct });
  state.feedback = { correct, message: q.explain };
  state.awaitingNext = true;
  render();
}

function nextQuestion() {
  state.feedback = null;
  state.awaitingNext = false;
  if (state.questionIndex + 1 >= state.questionDraw.length) {
    // Battle over — record stars (highest ever) and raw score
    const correctCount = state.answers.filter(a => a.correct).length;
    const total = state.answers.length;
    const stars = calculateStars(correctCount, total);
    if (stars > state.completed[state.battleId]) {
      state.completed[state.battleId] = stars;
    }
    if (correctCount > state.bestScore[state.battleId]) {
      state.bestScore[state.battleId] = correctCount;
    }
    go('result');
  } else {
    state.questionIndex++;
    render();
  }
}

/* Finale unlocks when each of the 6 acts has earned at least 3 stars */
function allBattlesCompleted() {
  return state.completed.a1 >= 3 && state.completed.a2 >= 3 && state.completed.a3 >= 3
      && state.completed.a4 >= 3 && state.completed.a5 >= 3 && state.completed.a6 >= 3;
}

/* ---------- RENDERERS ---------- */
function renderStarsInline(filled, total) {
  let s = '';
  for (let i = 0; i < total; i++) {
    s += `<span class="${i < filled ? 'filled' : 'empty'}">★</span>`;
  }
  return s;
}

function renderHub() {
  const finalLocked = !allBattlesCompleted();
  const battleCard = (id) => {
    const meta = BATTLES[id];
    const stars = state.completed[id];
    const completed = stars > 0;
    const isFinal = id === 'final';
    const locked = isFinal && finalLocked;
    const cls = `lesson-poster ${isFinal ? 'final' : ''} ${locked ? 'locked' : ''}`;
    const totalStars = 5;
    const bestLabel = isFinal && state.bestScore[id] > 0
      ? `BEST: ${state.bestScore[id]}/12`
      : `BEST: ${stars}/5`;
    return `
      <div class="${cls}" ${locked ? '' : `onclick="startBattle('${id}', false)"`} role="button" tabindex="${locked ? -1 : 0}" aria-label="${meta.title}, ${locked ? 'locked' : (completed ? `${stars} of ${totalStars} stars` : 'not yet attempted')}">
        <div class="act-label">${meta.actLabel}</div>
        <div class="lesson-name">${meta.title}</div>
        <div class="lesson-sub">${meta.subtitle}</div>
        <div class="lesson-illustration">${locked ? '<div class="lock-icon">🔒</div>' : ILLUSTRATIONS[meta.illustration]}</div>
        ${locked
          ? `<div style="font-family:'Cinzel',serif; font-size:0.78rem; color:var(--gold-deep); letter-spacing:0.12em; text-align:center; line-height:1.5;">EARN 3+ STARS<br/>IN ALL SIX ACTS<br/>TO UNLOCK</div>`
          : `<div class="stars-row">${renderStarsInline(stars, totalStars)}</div>
             <div class="status-pill ${completed ? 'complete' : 'new'}">${completed ? bestLabel : 'NEW'}</div>`}
      </div>`;
  };

  return `
    <div class="spotlight"></div>
    <h1 class="marquee-title huge">Dance Battle</h1>
    <div class="subtitle">★ The Geometry Showcase ★</div>
    <p class="hub-intro">Six acts of geometric transformation — three rigid motions, then congruence and similarity. Each battle reshuffles, so no two performances are alike.</p>

    <div class="part-header">— Part I · Rigid Motions —</div>
    <div class="posters-grid">
      ${battleCard('a1')}
      ${battleCard('a2')}
      ${battleCard('a3')}
    </div>

    <div class="part-header">— Part II · Congruence &amp; Similarity —</div>
    <div class="posters-grid">
      ${battleCard('a4')}
      ${battleCard('a5')}
      ${battleCard('a6')}
    </div>

    <div class="part-header">— Grand Finale —</div>
    <div class="posters-grid finale-grid">
      ${battleCard('final')}
    </div>
  `;
}

function renderPlaybook() {
  const meta = BATTLES[state.battleId];
  const pb = PLAYBOOKS[state.battleId];
  return `
    <button class="back-link" onclick="go('hub')">← Back to Marquee</button>
    <div style="margin-top: 24px;">
      <div class="subtitle" style="text-align:left; margin-top:0;">${meta.actLabel} · Playbook</div>
      <h1 class="marquee-title big" style="text-align:left; margin-top:6px;">${pb.title}: Battle Playbook</h1>
    </div>
    <div class="poster" style="margin-top: 28px;">
      <div class="playbook-section">
        <h3>⚔ Tactics</h3>
        <ul>
          ${pb.tactics.map(t => `<li>${t}</li>`).join('')}
        </ul>
      </div>
      <div class="playbook-section">
        <h3>📜 Worked Examples</h3>
        ${pb.examples.map(ex => `
          <div class="worked-example">
            <div class="ex-label">${ex.label}</div>
            <div>${ex.body}</div>
          </div>
        `).join('')}
      </div>
      <div class="watch-out">
        <p>${pb.watchOut}</p>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="go('battle')">⚐ Raise the Curtain ⚐</button>
        <button class="btn btn-secondary" onclick="go('hub')">← Back to Marquee</button>
      </div>
    </div>
  `;
}

function renderBattle() {
  const meta = BATTLES[state.battleId];
  const q = state.questionDraw[state.questionIndex];
  const total = state.questionDraw.length;
  const idx = state.questionIndex;
  const showingFeedback = state.awaitingNext;

  // Progress bulbs
  let bulbs = '';
  for (let i = 0; i < total; i++) {
    let cls = 'bulb';
    if (i < idx) cls += ' lit';
    else if (i === idx && !showingFeedback) cls += ' current';
    else if (i === idx && showingFeedback) cls += state.answers[idx].correct ? ' lit' : '';
    bulbs += `<div class="${cls}"></div>`;
  }

  // Visual SVG (if any)
  let visualHtml = '';
  if (q.visual && q.visual.kind === 'plane') {
    visualHtml = svgCoordPlane(q.visual.config);
  }

  // Question body — depends on type
  let answerArea = '';
  if (q.type === 'mc') {
    answerArea = `<div class="choices">
      ${q.choices.map((choice, i) => {
        let cls = 'choice';
        if (showingFeedback) {
          if (i === q.answerIndex) cls += ' correct';
          else if (state.answers[idx] && !state.answers[idx].correct && state.lastMcPick === i) cls += ' incorrect';
        }
        const letter = String.fromCharCode(65 + i);
        return `<button class="${cls}" ${showingFeedback ? 'disabled' : ''} onclick="handleMcClick(${i})">
          <span class="choice-letter">${letter}</span>
          <span>${choice}</span>
        </button>`;
      }).join('')}
    </div>`;
  } else if (q.type === 'num') {
    const val = state.lastNumInput || '';
    const cls = showingFeedback ? (state.answers[idx].correct ? 'numeric-input correct' : 'numeric-input incorrect') : 'numeric-input';
    answerArea = `<div class="numeric-row">
      <input type="text" id="numInput" class="${cls}" value="${val}" placeholder="?" ${showingFeedback ? 'disabled' : ''} onkeydown="handleNumKey(event)" autocomplete="off" inputmode="decimal" />
      ${q.suffix ? `<span style="font-family:'Cinzel',serif; font-size:1.1rem; color:var(--burgundy);">${q.suffix}</span>` : ''}
      ${!showingFeedback ? `<button class="btn btn-primary" style="padding:10px 20px;" onclick="handleNumSubmit()">Submit</button>` : ''}
    </div>`;
  } else if (q.type === 'coord') {
    const vx = state.lastCoordInput?.x || '';
    const vy = state.lastCoordInput?.y || '';
    const correctClass = showingFeedback ? (state.answers[idx].correct ? 'correct' : 'incorrect') : '';
    answerArea = `<div class="coord-row">
      <span>(</span>
      <input type="text" id="coordX" class="numeric-input ${correctClass}" value="${vx}" placeholder="x" ${showingFeedback ? 'disabled' : ''} onkeydown="handleCoordKey(event)" autocomplete="off" inputmode="decimal" />
      <span>,</span>
      <input type="text" id="coordY" class="numeric-input ${correctClass}" value="${vy}" placeholder="y" ${showingFeedback ? 'disabled' : ''} onkeydown="handleCoordKey(event)" autocomplete="off" inputmode="decimal" />
      <span>)</span>
      ${!showingFeedback ? `<button class="btn btn-primary" style="padding:10px 20px;" onclick="handleCoordSubmit()">Submit</button>` : ''}
    </div>`;
  }

  // Feedback area
  let feedbackHtml = '';
  if (showingFeedback) {
    const f = state.feedback;
    let correctAnswerText = '';
    if (!f.correct) {
      if (q.type === 'mc') correctAnswerText = `Correct answer: <strong>${q.choices[q.answerIndex]}</strong>. `;
      else if (q.type === 'num') correctAnswerText = `Correct answer: <strong>${q.answer}${q.suffix ? ' ' + q.suffix : ''}</strong>. `;
      else if (q.type === 'coord') correctAnswerText = `Correct answer: <strong>(${q.answer[0]}, ${q.answer[1]})</strong>. `;
    }
    feedbackHtml = `
      <div class="feedback ${f.correct ? 'correct' : 'incorrect'}">
        <div class="icon">${f.correct ? '★' : '✗'}</div>
        <div class="text">
          <strong>${f.correct ? 'Bravo!' : 'Not quite.'}</strong>
          ${correctAnswerText ? '<br/>' + correctAnswerText : ' '}
          ${f.message}
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="nextQuestion()">${state.questionIndex + 1 >= total ? 'Finish ▸' : 'Next ▸'}</button>
      </div>
    `;
  }

  return `
    <div class="battle-header">
      <div class="act-name"><span>${meta.actLabel}</span> · ${meta.title}</div>
      <button class="back-link" onclick="confirmExitBattle()">↩ Exit Battle</button>
    </div>
    <h1 class="marquee-title big">${meta.title}</h1>
    <div class="progress-bulbs">${bulbs}</div>
    <div class="poster question-card">
      <div class="q-number">Question ${idx + 1} of ${total}</div>
      <div class="q-prompt">${q.prompt}</div>
      ${visualHtml}
      ${answerArea}
      ${feedbackHtml}
    </div>
    ${state.battleId !== 'final' && PLAYBOOKS[state.battleId] ? `
      <div style="text-align:center; margin-top:18px;">
        <button class="btn-ghost btn" style="font-size:0.8rem; padding:8px 16px;" onclick="goToPlaybookFromBattle()">📖 View Playbook</button>
      </div>` : ''}
  `;
}

function confirmExitBattle() {
  if (state.questionIndex > 0 || state.answers.length > 0) {
    if (!confirm('Exit this battle? Your progress in this round will be lost.')) return;
  }
  go('hub');
}

function renderResult() {
  const meta = BATTLES[state.battleId];
  const correctCount = state.answers.filter(a => a.correct).length;
  const total = state.answers.length;
  const stars = calculateStars(correctCount, total);

  let verdict;
  if (stars === 5) verdict = 'Standing Ovation!';
  else if (stars === 4) verdict = 'Encore Worthy!';
  else if (stars === 3) verdict = 'A Solid Show.';
  else if (stars === 2) verdict = 'The Curtain Falls.';
  else if (stars === 1) verdict = 'A Rough Night.';
  else verdict = 'Back to Rehearsal.';

  const isFinal = state.battleId === 'final';
  const allDone = allBattlesCompleted();
  // "Just unlocked" if this run took us to all-three-star territory
  const justUnlockedFinal = !isFinal && allDone && state.completed.final === 0
    && stars >= 3 && state.completed[state.battleId] >= 3;

  let starsHtml = '';
  for (let i = 0; i < 5; i++) {
    starsHtml += `<span class="star ${i < stars ? 'filled' : ''}" style="animation-delay: ${i * 0.15}s">★</span>`;
  }

  return `
    <div class="spotlight"></div>
    <div class="subtitle">${meta.actLabel} · Curtain Call</div>
    <h1 class="marquee-title big" style="margin-top:8px;">${meta.title}</h1>
    <div class="poster result-card" style="margin-top: 28px;">
      <div class="stars-display">${starsHtml}</div>
      <div class="verdict">${verdict}</div>
      <div class="score">You scored <strong>${correctCount}</strong> out of <strong>${total}</strong></div>
      ${justUnlockedFinal ? `<div style="margin-top:18px; padding:14px; background:rgba(255,224,102,0.25); border:2px dashed var(--gold-deep); border-radius:6px; font-family:'Cinzel',serif; color:var(--burgundy);">🔓 <strong>The Grand Finale is unlocked!</strong></div>` : ''}
      <div class="btn-row">
        <button class="btn btn-primary" onclick="startBattle('${state.battleId}', true)">⟲ Retry Battle</button>
        <button class="btn btn-secondary" onclick="go('hub')">← Marquee</button>
      </div>
    </div>
  `;
}

/* ---------- INPUT HANDLERS ---------- */
function handleMcClick(i) {
  state.lastMcPick = i;
  submitAnswer(i);
}
function handleNumSubmit() {
  const el = document.getElementById('numInput');
  const v = el ? el.value : '';
  state.lastNumInput = v;
  submitAnswer(v);
}
function handleNumKey(e) {
  if (e.key === 'Enter') { e.preventDefault(); handleNumSubmit(); }
}
function handleCoordSubmit() {
  const x = document.getElementById('coordX')?.value || '';
  const y = document.getElementById('coordY')?.value || '';
  state.lastCoordInput = { x, y };
  submitAnswer({ x, y });
}
function handleCoordKey(e) {
  if (e.key === 'Enter') { e.preventDefault(); handleCoordSubmit(); }
}

/* ---------- MAIN RENDER ---------- */
function render() {
  const app = document.getElementById('app');
  // Reset transient input state when entering a fresh question
  if (state.screen === 'battle' && !state.awaitingNext) {
    state.lastMcPick = undefined;
    state.lastNumInput = '';
    state.lastCoordInput = { x: '', y: '' };
  }
  let html = '';
  if (state.screen === 'hub') html = renderHub();
  else if (state.screen === 'playbook') html = renderPlaybook();
  else if (state.screen === 'battle') html = renderBattle();
  else if (state.screen === 'result') html = renderResult();
  app.innerHTML = html;

  // Auto-focus inputs
  if (state.screen === 'battle' && !state.awaitingNext) {
    const q = state.questionDraw[state.questionIndex];
    setTimeout(() => {
      if (q.type === 'num') document.getElementById('numInput')?.focus();
      else if (q.type === 'coord') document.getElementById('coordX')?.focus();
    }, 50);
  }
}

// First render
render();

</script>
</body>
</html>
